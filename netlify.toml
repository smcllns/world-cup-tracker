[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Clean URL for the auto-updating calendar subscription feed.
[[redirects]]
  from = "/calendar.ics"
  to = "/.netlify/functions/calendar"
  status = 200

# Single-page app: serve index.html for any other path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
